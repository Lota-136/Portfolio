<!DOCTYPE html>

<head>
    <title>はっくつゲーム｜ポートフォリオ</title>
    <link href="style.css" rel="stylesheet" type="text/css">

    <!-- google web fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&display=swap" rel="stylesheet">
</head>

<body>
    <div id="title"><strong>はっくつゲーム</strong></div>
    <div id="main-visual">
        <div class="design-tab">
            <div class="mac-button" style="background-color: #ff6666; top: 25%; left: 10px;"></div>
            <div class="mac-button" style="background-color: #ffdd00; top: 25%; left: 35px;"></div>
            <div class="mac-button" style="background-color: #66ff66; top: 25%; left: 60px;"></div>
        </div>
        <image class="main-visual-image" src="image/hakkutu_mv.png"></image>
    </div>

    <div id="main">

        <div class="acsess">
            「はっくつゲーム」をプレイ<br>
            <a href="https://lota-136.github.io/HakkutuGame/" target="_blank">
                https://lota-136.github.io/HakkutuGame/
            </a>
        </div>

        <div class="explain">
            <img class="explain-image" src="image/hakkutu_ex1.png">

            <div class="explain-text">
                大阪府四條畷市の埋蔵文化財をテーマにしたパズルゲームです。３種類の道具を使い分けて盤面の土を除去します。
            </div>
        </div>

        <div class="explain">
            <img class="explain-image" src="image/hakkutu_ex2.png">

            <div class="explain-text">
                クリアすると文化財の解説とイラストを見ることができます。対象年齢などを考え、漢字を崩す、ふりがなをつけるなど工夫しています。
            </div>
        </div>

        <div class="explain">
            <img class="explain-image" src="image/hakkutu_ex3.png">

            <div class="explain-text">
                手軽さというブラウザゲームの利点を活かすため、スマートフォンでは縦画面でプレイでき、操作方法やレイアウトも変更しています。
            </div>
        </div>

    </div>

    <a href="index.html" class="back">
        リストに戻る
    </a>
